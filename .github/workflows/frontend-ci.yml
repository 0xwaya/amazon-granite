name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    needs: secret-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-production:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Validate required deployment secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTRACTOR_SESSION_SECRET: ${{ secrets.CONTRACTOR_SESSION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_COMPANY_PHONE: ${{ secrets.NEXT_PUBLIC_COMPANY_PHONE }}
          NEXT_PUBLIC_LEAD_EMAIL: ${{ secrets.NEXT_PUBLIC_LEAD_EMAIL }}
          NEXT_PUBLIC_WAYALABS_URL: ${{ secrets.NEXT_PUBLIC_WAYALABS_URL }}
        run: |
          missing=()
          [[ -z "$VERCEL_TOKEN" ]] && missing+=("VERCEL_TOKEN")
          [[ -z "$SUPABASE_PROJECT_URL" ]] && missing+=("SUPABASE_PROJECT_URL")
          [[ -z "$SUPABASE_SERVICE_ROLE_KEY" ]] && missing+=("SUPABASE_SERVICE_ROLE_KEY")
          [[ -z "$CONTRACTOR_SESSION_SECRET" ]] && missing+=("CONTRACTOR_SESSION_SECRET")
          [[ -z "$RESEND_API_KEY" ]] && missing+=("RESEND_API_KEY")
          [[ -z "$NEXT_PUBLIC_SITE_URL" ]] && missing+=("NEXT_PUBLIC_SITE_URL")
          [[ -z "$NEXT_PUBLIC_COMPANY_PHONE" ]] && missing+=("NEXT_PUBLIC_COMPANY_PHONE")
          [[ -z "$NEXT_PUBLIC_LEAD_EMAIL" ]] && missing+=("NEXT_PUBLIC_LEAD_EMAIL")
          [[ -z "$NEXT_PUBLIC_WAYALABS_URL" ]] && missing+=("NEXT_PUBLIC_WAYALABS_URL")

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Sync env vars to Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_1kzXJnG8hT3T3zkXXhaWuWgL
          VERCEL_PROJECT_ID: prj_RA55KfqImv5WyPIbxyvrM78tirkR
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTRACTOR_SESSION_SECRET: ${{ secrets.CONTRACTOR_SESSION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_COMPANY_PHONE: ${{ secrets.NEXT_PUBLIC_COMPANY_PHONE }}
          NEXT_PUBLIC_LEAD_EMAIL: ${{ secrets.NEXT_PUBLIC_LEAD_EMAIL }}
          NEXT_PUBLIC_WAYALABS_URL: ${{ secrets.NEXT_PUBLIC_WAYALABS_URL }}
        run: |
          rm -rf frontend/.vercel
          vercel link --yes \
            --cwd frontend \
            --token "$VERCEL_TOKEN" \
            --team "$VERCEL_ORG_ID" \
            --project "$VERCEL_PROJECT_ID"

          upsert_env() {
            local key=$1 value=$2
            vercel env remove "$key" production --cwd frontend --token "$VERCEL_TOKEN" --yes 2>/dev/null || true
            printf '%s' "$value" | vercel env add "$key" production --cwd frontend --token "$VERCEL_TOKEN" --yes
            echo "Set $key"
          }
          upsert_env SUPABASE_PROJECT_URL      "$SUPABASE_PROJECT_URL"
          upsert_env SUPABASE_SERVICE_ROLE_KEY "$SUPABASE_SERVICE_ROLE_KEY"
          upsert_env CONTRACTOR_SESSION_SECRET "$CONTRACTOR_SESSION_SECRET"
          upsert_env RESEND_API_KEY            "$RESEND_API_KEY"
          upsert_env NEXT_PUBLIC_SITE_URL      "$NEXT_PUBLIC_SITE_URL"
          upsert_env NEXT_PUBLIC_COMPANY_PHONE "$NEXT_PUBLIC_COMPANY_PHONE"
          upsert_env NEXT_PUBLIC_LEAD_EMAIL    "$NEXT_PUBLIC_LEAD_EMAIL"
          upsert_env NEXT_PUBLIC_WAYALABS_URL  "$NEXT_PUBLIC_WAYALABS_URL"

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_1kzXJnG8hT3T3zkXXhaWuWgL
          VERCEL_PROJECT_ID: prj_RA55KfqImv5WyPIbxyvrM78tirkR
        run: |
          vercel deploy --prod --cwd frontend --yes --token "$VERCEL_TOKEN"