name: Frontend CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    needs: secret-scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Validate required deployment secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTRACTOR_SESSION_SECRET: ${{ secrets.CONTRACTOR_SESSION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_COMPANY_PHONE: ${{ secrets.NEXT_PUBLIC_COMPANY_PHONE }}
          NEXT_PUBLIC_LEAD_EMAIL: ${{ secrets.NEXT_PUBLIC_LEAD_EMAIL }}
          NEXT_PUBLIC_WAYALABS_URL: ${{ secrets.NEXT_PUBLIC_WAYALABS_URL }}
        run: |
          missing=()
          [[ -z "$VERCEL_TOKEN" ]] && missing+=("VERCEL_TOKEN")
          [[ -z "$SUPABASE_PROJECT_URL" ]] && missing+=("SUPABASE_PROJECT_URL")
          [[ -z "$SUPABASE_SERVICE_ROLE_KEY" ]] && missing+=("SUPABASE_SERVICE_ROLE_KEY")
          [[ -z "$CONTRACTOR_SESSION_SECRET" ]] && missing+=("CONTRACTOR_SESSION_SECRET")
          [[ -z "$RESEND_API_KEY" ]] && missing+=("RESEND_API_KEY")
          [[ -z "$NEXT_PUBLIC_SITE_URL" ]] && missing+=("NEXT_PUBLIC_SITE_URL")
          [[ -z "$NEXT_PUBLIC_COMPANY_PHONE" ]] && missing+=("NEXT_PUBLIC_COMPANY_PHONE")
          [[ -z "$NEXT_PUBLIC_LEAD_EMAIL" ]] && missing+=("NEXT_PUBLIC_LEAD_EMAIL")
          [[ -z "$NEXT_PUBLIC_WAYALABS_URL" ]] && missing+=("NEXT_PUBLIC_WAYALABS_URL")

          if (( ${#missing[@]} > 0 )); then
            echo "Missing required GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Sync env vars to Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CONTRACTOR_SESSION_SECRET: ${{ secrets.CONTRACTOR_SESSION_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_COMPANY_PHONE: ${{ secrets.NEXT_PUBLIC_COMPANY_PHONE }}
          NEXT_PUBLIC_LEAD_EMAIL: ${{ secrets.NEXT_PUBLIC_LEAD_EMAIL }}
          NEXT_PUBLIC_WAYALABS_URL: ${{ secrets.NEXT_PUBLIC_WAYALABS_URL }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, json

          token = os.environ['VERCEL_TOKEN']
          project_id = 'prj_RA55KfqImv5WyPIbxyvrM78tirkR'
          team_id = 'team_1kzXJnG8hT3T3zkXXhaWuWgL'
          headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}

          def api(method, path, body=None):
              req = urllib.request.Request(
                  f'https://api.vercel.com{path}?teamId={team_id}',
                  data=json.dumps(body).encode() if body else None,
                  headers=headers,
                  method=method
              )
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          existing = {e['key']: e['id'] for e in api('GET', f'/v9/projects/{project_id}/env').get('envs', [])}

          env_vars = {
              'SUPABASE_PROJECT_URL':       (os.environ['SUPABASE_PROJECT_URL'],       'encrypted'),
              'SUPABASE_SERVICE_ROLE_KEY':  (os.environ['SUPABASE_SERVICE_ROLE_KEY'],  'encrypted'),
              'CONTRACTOR_SESSION_SECRET':  (os.environ['CONTRACTOR_SESSION_SECRET'],  'encrypted'),
              'RESEND_API_KEY':             (os.environ['RESEND_API_KEY'],             'encrypted'),
              'NEXT_PUBLIC_SITE_URL':       (os.environ['NEXT_PUBLIC_SITE_URL'],       'plain'),
              'NEXT_PUBLIC_COMPANY_PHONE':  (os.environ['NEXT_PUBLIC_COMPANY_PHONE'],  'plain'),
              'NEXT_PUBLIC_LEAD_EMAIL':     (os.environ['NEXT_PUBLIC_LEAD_EMAIL'],     'plain'),
              'NEXT_PUBLIC_WAYALABS_URL':   (os.environ['NEXT_PUBLIC_WAYALABS_URL'],   'plain'),
          }

          for key, (value, var_type) in env_vars.items():
              payload = {'value': value, 'target': ['production', 'preview'], 'type': var_type}
              if key in existing:
                  api('PATCH', f'/v9/projects/{project_id}/env/{existing[key]}', payload)
                  print(f'Updated {key}')
              else:
                  api('POST', f'/v10/projects/{project_id}/env', {**payload, 'key': key})
                  print(f'Created {key}')
          EOF

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_1kzXJnG8hT3T3zkXXhaWuWgL
          VERCEL_PROJECT_ID: prj_RA55KfqImv5WyPIbxyvrM78tirkR
        run: |
          vercel deploy --prod --cwd frontend --yes --token "$VERCEL_TOKEN"